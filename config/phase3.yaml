# Module 3: MCTS Inference Engine

inference:
  max_depth: 12
  num_simulations: 32
  exploration_constant: 1.4
  parallel_workers: 4

early_exit:
  enabled: true
  confidence_threshold: 0.35
  min_steps_before_exit: 1

adaptive_boost:
  enabled: true
  max_concurrent_branches: 8
  boost_factor: 1.5

genprm:
  mode: heuristic  # heuristic | llm
  llm:
    model: meta-llama/Llama-3.1-70B-Instruct
    base_url: http://localhost:8000/v1
    api_key: null
    temperature: 0.0
    timeout: 120

policy:
  mode: rule_based  # rule_based | llm

llm:
  model: meta-llama/Llama-3.1-8B-Instruct
  base_url: http://localhost:8000/v1
  api_key: null
  temperature: 0.7
  timeout: 120

sandbox:
  database_root: data/sandbox
  dialect: sqlite
